name: LEZ Bump

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      lez_ref:
        description: 'LEZ commit/branch (default: main)'
        required: false
        default: 'main'

env:
  CARGO_TERM_COLOR: always

jobs:
  bump:
    name: Bump LEZ + PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      lez_commit: ${{ steps.lez.outputs.commit }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      action: ${{ steps.pr.outputs.action }}
      branch: ${{ steps.pr.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - name: Get latest LEZ commit
        id: lez
        run: |
          REF="${{ github.event.inputs.lez_ref || 'main' }}"
          COMMIT=$(git ls-remote https://github.com/logos-blockchain/logos-execution-zone.git "$REF" | head -1 | cut -f1)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Testing against LEZ $REF: $COMMIT"

      - name: Find or create LEZ bump PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const LEZ = '${{ steps.lez.outputs.commit }}'.slice(0,8);
            const FORCE = '${{ github.event.inputs.force }}' === 'true';

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:lez-bump/`,
              per_page: 5,
            }).catch(() => ({ data: [] }));

            if (existing.data.length > 0 && !FORCE) {
              const pr = existing.data[0];
              console.log(`Updating existing PR #${pr.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🤖 LEZ updated to \`${LEZ}\` — running checks...`,
              });
              core.setOutput('pr_number', pr.number);
              core.setOutput('branch', pr.head.ref);
              core.setOutput('action', 'updated');
            } else {
              const branch = `lez-bump/${new Date().toISOString().slice(0,10)}`;
              console.log(`Creating new PR on branch: ${branch}`);
              core.setOutput('branch', branch);
              core.setOutput('pr_number', '');
              core.setOutput('action', 'created');
            }

      - name: Create new PR branch
        if: steps.pr.outputs.action == 'created'
        run: |
          git checkout -b "${{ steps.pr.outputs.branch }}"

          LEZ="${{ steps.lez.outputs.commit }}"
          for f in spel-cli/Cargo.toml spel-framework-core/Cargo.toml spel-framework/Cargo.toml tests/e2e/fixture_program/Cargo.toml; do
            [ -f "$f" ] || continue
            sed -i "s|rev = \"[a-f0-9]\{40\}\"|rev = \"$LEZ\"|g" "$f"
            sed -i "s|logos-blockchain/lssa\.git|logos-blockchain/logos-execution-zone.git|g" "$f"
            echo "Updated: $f"
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(bump): update LEZ to $LEZ"
          git push -u origin "${{ steps.pr.outputs.branch }}" -o ci.skip

      - name: Push update to existing PR
        if: steps.pr.outputs.action == 'updated'
        run: |
          git fetch origin
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout "${{ steps.pr.outputs.branch }}"

          LEZ="${{ steps.lez.outputs.commit }}"
          for f in spel-cli/Cargo.toml spel-framework-core/Cargo.toml spel-framework/Cargo.toml tests/e2e/fixture_program/Cargo.toml; do
            [ -f "$f" ] || continue
            sed -i "s|rev = \"[a-f0-9]\{40\}\"|rev = \"$LEZ\"|g" "$f"
            sed -i "s|logos-blockchain/lssa\.git|logos-blockchain/logos-execution-zone.git|g" "$f"
          done

          git add .
          git commit --amend --no-edit || true
          git push --force-with-lease

      - name: Create PR
        if: steps.pr.outputs.action == 'created'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.pr.outputs.branch }}';
            const LEZ = '${{ steps.lez.outputs.commit }}'.slice(0,8);
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore(bump): update LEZ to ${LEZ}`,
              body: `Automated LEZ dependency bump.\n\n- **LEZ:** \`${LEZ}\`\n- **Actor:** @${context.actor}\n\nCI will run cargo check. Merge if all pass.`,
              head: branch,
              base: 'main',
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.number, labels: ['lez-bump'],
            }).catch(() => {});
            core.setOutput('pr_number', pr.number);
            console.log(`Created PR #${pr.number}`);

  ci:
    name: Cargo Check
    needs: bump
    runs-on: ubuntu-latest
    if: needs.bump.outputs.pr_number != ''
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.branch }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "lez-bump-ci"

      - name: Install logos-blockchain-circuits
        run: |
          curl -sSL https://raw.githubusercontent.com/logos-blockchain/logos-blockchain/main/scripts/setup-logos-blockchain-circuits.sh | bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cargo check (spel)
        run: cargo check -p spel

      - name: Cargo check (spel-framework)
        run: cargo check -p spel-framework

      - name: Cargo check (spel-framework-core)
        run: cargo check -p spel-framework-core

      - name: Post result + merge
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = parseInt('${{ needs.bump.outputs.pr_number }}');
            const lez = '${{ needs.bump.outputs.lez_commit }}'.slice(0,8);
            const success = '${{ job.status }}' === 'success';

            const emoji = success ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              body: `${emoji} **Cargo check** against LEZ \`${lez}\` — ${success ? 'all passed, merging!' : 'FAILED. See CI logs.'}`,
            });

            if (success) {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNum,
                merge_method: 'squash',
                commit_title: `chore(bump): merge LEZ ${lez} (auto)`,
              });
              console.log('Auto-merged!');
            }
