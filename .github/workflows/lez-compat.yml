name: LEZ Bump

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      lez_ref:
        description: 'LEZ commit/branch (default: main)'
        required: false
        default: 'main'

env:
  CARGO_TERM_COLOR: always

jobs:
  bump:
    name: Bump LEZ + PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    outputs:
      lez_commit: ${{ steps.lez.outputs.commit }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      action: ${{ steps.pr.outputs.action }}
      branch: ${{ steps.pr.outputs.branch }}

    steps:
      - uses: actions/checkout@v4

      - name: Get latest LEZ commit
        id: lez
        run: |
          REF="${{ github.event.inputs.lez_ref || 'main' }}"
          COMMIT=$(git ls-remote https://github.com/logos-blockchain/logos-execution-zone.git "$REF" | head -1 | cut -f1)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find or create LEZ bump PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const FORCE = '${{ github.event.inputs.force }}' === 'true';
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:lez-bump/`,
              per_page: 5,
            }).catch(() => ({ data: [] }));

            if (existing.data.length > 0 && !FORCE) {
              const pr = existing.data[0];
              console.log(`Found existing PR #${pr.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🤖 LEZ updated — running checks...`,
              });
              core.setOutput('pr_number', String(pr.number));
              core.setOutput('branch', pr.head.ref);
              core.setOutput('action', 'updated');
            } else {
              const branch = `lez-bump/${new Date().toISOString().slice(0,10)}`;
              console.log(`Creating new branch: ${branch}`);
              core.setOutput('branch', branch);
              core.setOutput('pr_number', '');
              core.setOutput('action', 'created');
            }

      - name: Create or update branch
        run: |
          BRANCH="${{ steps.pr.outputs.branch }}"
          LEZ="${{ steps.lez.outputs.commit }}"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "Fetching existing branch: $BRANCH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git rebase origin/main || true
          else
            echo "Creating new branch: $BRANCH"
            git checkout -b "$BRANCH"
          fi

          for f in spel-cli/Cargo.toml spel-framework-core/Cargo.toml spel-framework/Cargo.toml tests/e2e/fixture_program/Cargo.toml; do
            [ -f "$f" ] || continue
            sed -i "s|rev = \"[a-f0-9]\{40\}\"|rev = \"$LEZ\"|g" "$f"
            sed -i "s|logos-blockchain/lssa\.git|logos-blockchain/logos-execution-zone.git|g" "$f"
            echo "Updated: $f"
          done

          git add .
          git commit --amend --no-edit || git commit -m "chore(bump): update LEZ to $LEZ"
          git push --force-with-lease origin "$BRANCH"

      - name: Create PR (new branch only)
        if: steps.pr.outputs.action == 'created'
        run: |
          BRANCH="${{ steps.pr.outputs.branch }}"
          LEZ="${{ steps.lez.outputs.commit }}"
          LEZ_SHORT="${LEZ:0:8}"
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "chore(bump): update LEZ to $LEZ_SHORT" \
            --body "Automated LEZ dependency bump. LEZ: \`$LEZ\`. Actor: @$GITHUB_ACTOR. CI will run cargo check. Merge if all pass." \
            --head "$BRANCH" \
            --base main \
            --label lez-bump > /tmp/pr_url.txt 2>&1
          PR_URL=$(cat /tmp/pr_url.txt | grep '^https://' | head -1)
          PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$' | tail -1)
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

  ci:
    name: Cargo Check
    needs: bump
    runs-on: ubuntu-latest
    if: needs.bump.outputs.pr_number != ''
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.branch }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "lez-bump-ci"

      - name: Install logos-blockchain-circuits
        run: |
          curl -sSL https://raw.githubusercontent.com/logos-blockchain/logos-blockchain/main/scripts/setup-logos-blockchain-circuits.sh | bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cargo check (spel)
        run: cargo check -p spel

      - name: Cargo check (spel-framework)
        run: cargo check -p spel-framework

      - name: Cargo check (spel-framework-core)
        run: cargo check -p spel-framework-core

      - name: Post result + merge
        if: always()
        run: |
          PR_NUM="${{ needs.bump.outputs.pr_number }}"
          LEZ="${{ needs.bump.outputs.lez_commit }}"
          LEZ_SHORT="${LEZ:0:8}"

          if [ '${{ job.status }}' = 'success' ]; then
            gh pr merge "$GITHUB_REPOSITORY" "$PR_NUM" --squash --delete-branch && echo "Merged!" || echo "Merge failed (check permissions)"
          else
            gh issue comment "$GITHUB_REPOSITORY" "$PR_NUM" --body "❌ Cargo check failed against LEZ \`$LEZ_SHORT\`. See CI logs." || true
          fi
