name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install logos-blockchain-circuits
        run: |
          curl -sSL https://raw.githubusercontent.com/logos-blockchain/logos-blockchain/main/scripts/setup-logos-blockchain-circuits.sh | bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Create release branch ──────────────────────────────────────────
      - name: Create release branch
        run: |
          VERSION="${{ inputs.version }}"
          git checkout -b "release/v${VERSION}"

      # ── Bump versions ──────────────────────────────────────────────────
      - name: Bump versions in Cargo.toml files
        run: |
          VERSION="${{ inputs.version }}"
          for toml in \
            spel-framework-core/Cargo.toml \
            spel-framework-macros/Cargo.toml \
            spel-framework/Cargo.toml \
            spel-client-gen/Cargo.toml \
            spel-cli/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" "$toml"
            echo "Bumped $toml to $VERSION"
          done

      # ── Build check ────────────────────────────────────────────────────
      - name: Cargo check
        run: cargo check

      - name: Run unit tests
        run: cargo test --lib

      # ── Generate CHANGELOG ─────────────────────────────────────────────
      - name: Generate CHANGELOG entry
        id: changelog
        run: |
          VERSION="${{ inputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            echo "No previous tag found — using full history"
          else
            RANGE="${PREV_TAG}..HEAD"
            echo "Generating changelog from $PREV_TAG to HEAD"
          fi
          
          # Categorize commits
          FEATS=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^feat:" | sed 's/^feat: //' || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep "^fix:" | sed 's/^fix: //' || true)
          BREAKING=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -E "^feat!:|^fix!:|BREAKING" || true)
          OTHER=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -vE "^(feat|fix|feat!|fix!|chore: bump|ci:|chore: retrigger)" || true)
          
          DATE=$(date +%Y-%m-%d)
          
          # Build categorized entry
          ENTRY="## v${VERSION} (${DATE})"
          
          if [ -n "$BREAKING" ]; then
            ENTRY="${ENTRY}\n\n### ⚠️ Breaking Changes\n${BREAKING}"
          fi
          
          if [ -n "$FEATS" ]; then
            ENTRY="${ENTRY}\n\n### ✨ Features\n${FEATS}"
          fi
          
          if [ -n "$FIXES" ]; then
            ENTRY="${ENTRY}\n\n### 🐛 Fixes\n${FIXES}"
          fi
          
          if [ -n "$OTHER" ]; then
            ENTRY="${ENTRY}\n\n### 📦 Other\n${OTHER}"
          fi
          
          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            echo -e "${ENTRY}\n\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi
          
          # Build release body
          BODY=""
          [ -n "$BREAKING" ] && BODY="${BODY}### ⚠️ Breaking Changes\n${BREAKING}\n\n"
          [ -n "$FEATS" ] && BODY="${BODY}### ✨ Features\n${FEATS}\n\n"
          [ -n "$FIXES" ] && BODY="${BODY}### 🐛 Fixes\n${FIXES}\n\n"
          [ -n "$OTHER" ] && BODY="${BODY}### 📦 Other\n${OTHER}\n\n"
          
          # Save for GitHub release
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Commit and push branch ─────────────────────────────────────────
      - name: Commit version bump + changelog
        run: |
          VERSION="${{ inputs.version }}"
          git add -A
          git commit -m "chore: release v${VERSION}"
          git push origin "release/v${VERSION}"

      # ── Open PR ───────────────────────────────────────────────────────
      - name: Create Release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo logos-co/spel \
            --title "Release v${{ inputs.version }}" \
            --base main \
            --head "release/v${{ inputs.version }}" \
            --body "## Release v${{ inputs.version }}

This PR prepares the release by:
- Bumping version in all Cargo.toml files
- Generating CHANGELOG.md
- Running tests

**On merge**, the release will be automatically tagged and published."  

  # ── Tag and release on merge ────────────────────────────────────────────
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from branch
        id: version
        run: |
          VERSION=${GITHUB_HEAD_REF#release/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## v${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.body }}

            ---

            **Installation** (Cargo.toml):
            ```toml
            spel-framework = { git = "https://github.com/logos-co/spel.git", tag = "v${{ steps.version.outputs.version }}" }
            ```
          draft: false
          prerelease: false
